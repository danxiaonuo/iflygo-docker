services:
  # iFlyGo Server (Lighthouse) 节点
  iflygo-server:
    container_name: iflygo-server
    image: iflyelf/iflygo:latest
    hostname: iflygo-server
    tty: true
    stdin_open: true
    privileged: true
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    # 环境变量
    environment:
      # 强制用环境变量重新生成配置(改环境变量后生效, 旧配置自动备份)
      - FORCE_REGEN=true
      # 运行模式
      - RUNMODE=server
      # 节点名称
      - NODE=uola-servers-lead-01
      # 此节点的内网 IP
      - IFLYGO_IP=10.88.0.1
      # 内网子网掩码
      - IFLYGO_NETMASK=16
      # 此节点的内网 IPv6 地址
      - IFLYGO_IP_V6=fd88::ffff:a58:1
      # IPv6 子网掩码
      - IFLYGO_NETMASK_V6=64
      ## Lighthouse 内网 IP
      #- LIGHTHOUSE_IP=10.88.0.1
      # Lighthouse 内网 IPv6
      #- LIGHTHOUSE_IP_V6=fd88::ffff:a58:1
      # Lighthouse 公网入口
      #- LIGHTHOUSE_PUBLIC=shanghai01.xiaonuo.me:6688
      # ===== 多 Lighthouse 配置（高可用场景，注释掉使用单 lighthouse） =====
      - LIGHTHOUSE_IP_1=10.88.0.1
      - LIGHTHOUSE_PUBLIC_1=shanghai01.xiaonuo.me:6688
      - LIGHTHOUSE_IP_1_V6=fd88::ffff:a58:1
      - LIGHTHOUSE_IP_2=10.88.0.2
      - LIGHTHOUSE_PUBLIC_2=shanghai02.xiaonuo.me:6688
      - LIGHTHOUSE_IP_2_V6=fd88::ffff:a58:2
      - LIGHTHOUSE_IP_3=10.88.0.3
      - LIGHTHOUSE_PUBLIC_3=sg01.xiaonuo.me:6688
      - LIGHTHOUSE_IP_3_V6=fd88::ffff:a58:3
      # 本地网络偏好范围
      - PREFERRED_RANGES=10.88.0.0/16,fd88::/64
      # 中继服务器列表
      - RELAYS=10.88.0.1,10.88.0.2
      # 不安全路由
      - UNSAFE_ROUTES=route=10.8.1.0/24,via=10.88.1.1,mtu=1300,metric=100;route=10.0.99.0/24,via=10.88.2.1:10|10.88.2.2:5;route=10.0.66.0/24,via=10.88.2.1:10|10.88.2.2:5
    # 数据卷所挂载路径设置
    volumes:
      # 配置与证书持久化
      # - ./data/server/config/config.yml:/etc/iflygo/config.yml:ro
      - ./data/server/config:/etc/iflygo:rw
      # 日志持久化
      - ./data/server/logs:/var/log/iflygo:rw
      # 同步宿主机时区与时间
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro,cached
      - /etc/localtime:/etc/localtime:ro,cached
    network_mode: host
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

  # iFlyGo Client 节点
  iflygo-client:
    container_name: iflygo-client
    image: iflyelf/iflygo:latest
    hostname: iflygo-client
    tty: true
    stdin_open: true
    privileged: true
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    # 环境变量
    environment:
      # 强制用环境变量重新生成配置(改环境变量后生效, 旧配置自动备份)
      - FORCE_REGEN=true
      # 运行模式
      - RUNMODE=client
      # 节点名称
      - NODE=uola-home-gw-01
      # 证书分组
      - CERT_GROUPS=home
      # 此节点的内网 IP
      - IFLYGO_IP=10.88.1.1
      # 内网子网掩码
      - IFLYGO_NETMASK=16
      # 此节点的内网 IPv6 地址
      - IFLYGO_IP_V6=fd88::ffff:a58:101
      # IPv6 子网掩码
      - IFLYGO_NETMASK_V6=64
      # 网关证书子网路由
      - SUBNETS=10.8.1.0/24
      # Lighthouse 内网 IP
      - LIGHTHOUSE_IP=10.88.0.1
      # Lighthouse 内网 IPv6
      - LIGHTHOUSE_IP_V6=fd88::ffff:a58:1
      # Lighthouse 公网入口
      - LIGHTHOUSE_PUBLIC=shanghai01.xiaonuo.me:6688
      # ===== 多 Lighthouse 配置（高可用场景，注释掉使用单 lighthouse） =====
      #- LIGHTHOUSE_IP_1=10.88.0.1
      #- LIGHTHOUSE_PUBLIC_1=shanghai01.xiaonuo.me:6688
      #- LIGHTHOUSE_IP_1_V6=fd88::ffff:a58:1
      #- LIGHTHOUSE_IP_2=10.88.0.2
      #- LIGHTHOUSE_PUBLIC_2=shanghai02.xiaonuo.me:6688
      #- LIGHTHOUSE_IP_2_V6=fd88::ffff:a58:2
      #- LIGHTHOUSE_IP_3=10.88.0.3
      #- LIGHTHOUSE_PUBLIC_3=sg01.xiaonuo.me:6688
      #- LIGHTHOUSE_IP_3_V6=fd88::ffff:a58:3
      # 本地网络偏好范围
      - PREFERRED_RANGES=10.88.0.0/16,fd88::/64
      # 中继服务器列表
      - RELAYS=10.88.0.1,10.88.0.2
      # 不安全路由
      - UNSAFE_ROUTES=route=10.8.1.0/24,via=10.88.1.1,mtu=1300,metric=100;route=10.0.99.0/24,via=10.88.2.1:10|10.88.2.2:5;route=10.0.66.0/24,via=10.88.2.1:10|10.88.2.2:5
    # 数据卷所挂载路径设置
    volumes:
      # 配置与证书持久化
      # - ./data/client/config/config.yml:/etc/iflygo/config.yml:ro
      - ./data/client/config:/etc/iflygo:rw
      # 日志持久化
      - ./data/client/logs:/var/log/iflygo:rw
      # 同步宿主机时区与时间
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro,cached
      - /etc/localtime:/etc/localtime:ro,cached
    network_mode: host
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

# 注意: 由于使用 network_mode: host, 不再需要定义自定义网络和端口映射
# 所有服务将直接使用宿主机网络栈
